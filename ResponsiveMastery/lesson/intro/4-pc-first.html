<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC First</title>
</head>

<body>
    <style>
        body {
            background-color: black;
        }

        /* Large device (desktops, less than 1200px) */
        @media (max-width: 1199.98px) {
            body {
                background-color: yellow;
            }
        }

        /* Medium device (tablets, less than 992px) */
        @media (max-width: 991.98px) {
            body {
                background-color: tomato;
            }
        }

        /* Small device (landscape phones, less than 768px) */
        @media (max-width: 767.98px) {
            body {
                background-color: gray;
            }
        }

        /* Extra small device (portrait phones, less than 576) */
        @media (max-width: 575.98px) {
            body {
                background-color: pink;
            }
        }
    </style>
    <h1>PC First</h1>
</body>

</html>
