<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show - hide responsive</title>
</head>
<body>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-size: 16px;
            margin: 0;
        }
        #wrapper {
            max-width: 960px;
            margin: 0 auto;
            padding: 0px 15px;
        }

        .box {
            padding: 30px 20px;
            background-color: yellow;
            margin-bottom: 30px;
        }

        .box.box-not-important {
            background-color: gray;
        }

        .box-not-important {
            display: none;
        }

        @media (min-width: 576px) {
            
        }

        /* Medium device (tablet, 768px and up) */
        @media (min-width: 768px) {
            .box-not-important {
                display: block;
            }
        }

        /* Large device (desktop, 992px and up) */
        @media (min-width: 992px) {
            
        }
    </style>
    <div id="wrapper">
        <h1>Show - hide responsive</h1>
        <div class="box box-important">Khối quan trọng</div>
        <div class="box box-not-important">Khối không quan trọng</div>
        <div class="box box-important">Khối quan trọng</div>
        <div class="box box-important">Khối quan trọng</div>
        <div class="box box-important">Khối quan trọng</div>
        <div class="box box-not-important">Khối không quan trọng</div>
    </div>
</body>
</html>
