<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gravitas+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Smooch+Sans:wght@100..900&display=swap');

        body {
            font-family: "Montserrat", sans-serif;
        }

        #wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50vh;
        }

        h1 {
            font-size: 22px;
            letter-spacing: 2px;
        }

        @media (min-width: 576px) {
            h1 {
                font-size: 30px;
            }
        }

        /* Medium device (tablet, 768px and up) */
        @media (min-width: 768px) {
            h1 {
                font-size: 35px;
            }
        }

        /* Large device (desktop, 992px and up) */
        @media (min-width: 992px) {
            h1 {
                font-size: 42px;
            }
        }
    </style>
    <div id="wrapper">
        <h1>RESPONSIVE MASTERY</h1>
    </div>
</body>

</html>
