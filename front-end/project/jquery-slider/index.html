<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider next prev trong jquery</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div id="wrapper">
        <div id="wp_slider">
            <div id="show">
                <img src="" alt="">
                <div id="slider_nav">
                    <div id="prev">
                        <i class="fa-solid fa-chevron-left"></i>
                    </div>
                    <div id="next">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <ul id="list_thumb">
                <li class="thumb_item"><a><img src="images/picture-1.png" alt=""></a></li>
                <li class="thumb_item"><a><img src="images/picture-2.png" alt=""></a></li>
                <li class="thumb_item"><a><img src="images/picture-3.png" alt=""></a></li>
                <li class="thumb_item"><a><img src="images/picture-4.png" alt=""></a></li>
            </ul>
        </div>
    </div>

    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
