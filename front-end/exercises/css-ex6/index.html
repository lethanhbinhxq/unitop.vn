<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xây dựng layout web 2 cột với Flex Css</title>
</head>

<body>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    #wrapper {
      max-width: 960px;
      margin: 0px auto;
    }

    .bg-blue {
      background-color: deepskyblue;
    }

    .text-white {
      color: white;
    }

    .text-center {
      text-align: center;
    }

    .p-15 {
      padding: 15px;
    }

    .p-10 {
      padding: 10px;
    }

    .flex {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: center;
    }

    #wp-content {
      min-height: 600px;
    }

    #content {
      background: #f3f3f3;
      flex: 1 1 600px;
    }

    #sidebar {
      background: #e1e1e1;
      flex: 1 1 360px;
    }
  </style>
  <div id="wrapper">
    <div id="header" class="bg-blue text-white text-center p-15">
      Layout web 2 cột - Flex Css
    </div>
    <div id="wp-content" class="flex">
      <div id="content" class="p-15">
        Content
      </div>
      <div id="sidebar" class="p-15">
        Sidebar
      </div>
    </div>
    <div id="footer" class="bg-blue text-white text-center p-10">
      unitop.vn
    </div>
  </div>
</body>

</html>
