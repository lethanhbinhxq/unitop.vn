<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider image</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <script type="text/javascript">
        $(document).ready(function () {
            var first_image = $("#list_slider_item img:first-child");
            first_image.toggleClass("border-red");
            $("#show img").attr("src", first_image.attr("src"));

            $("#list_slider_item img").click(function(){
                $("#show img").attr("src", $(this).attr("src"));
                $("#list_slider_item img").removeClass("border-red");
                $(this).toggleClass("border-red");
            });

            $("#prev").click(function(){
                var current_img_src = $("#show img").attr("src");
                var current_img = $("#list_slider_item").find("img[src='" + current_img_src + "']");
                var prev_img = current_img.prev("img");
                if (prev_img.length < 1) {
                    prev_img = $("#list_slider_item img:last");
                }
                $("#list_slider_item img").removeClass("border-red");
                prev_img.toggleClass("border-red");
                $("#show img").attr("src", prev_img.attr("src"));
            });

            $("#next").click(function(){
                var current_img_src = $("#show img").attr("src");
                var current_img = $("#list_slider_item").find("img[src='" + current_img_src + "']");
                var next_img = current_img.next("img");
                if (next_img.length < 1) {
                    next_img = $("#list_slider_item img:first");
                }
                $("#list_slider_item img").removeClass("border-red");
                next_img.toggleClass("border-red");
                $("#show img").attr("src", next_img.attr("src"));
            });
        });
    </script>

    <div id="wrapper">
        <div id="show">
            <img src="" alt="">
            <div id="prev"></div>
            <div id="next"></div>
        </div>
        <div id="list_slider_item">
            <img src="images/picture-1.png" alt="">
            <img src="images/picture-2.png" alt="">
            <img src="images/picture-3.png" alt="">
            <img src="images/picture-4.png" alt="">
        </div>
    </div>
</body>

</html>
