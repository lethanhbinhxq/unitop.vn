<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xây dựng layout web 2 cột với Float Css</title>
</head>

<body>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    #wrapper {
      width: 960px;
      margin: 0px auto;
    }

    .bg-green {
      background: green;
    }

    .text-white {
      color: white;
    }

    .text-center {
      text-align: center;
    }

    .p-15 {
      padding: 15px;
    }

    .p-10 {
      padding: 10px;
    }

    .float-left {
      float: left;
    }

    #content,
    #sidebar {
      min-height: 600px;
    }

    .clearfix:after {
      content: "";
      display: block;
      clear: both;
      visibility: hidden;
      line-height: 0;
      height: 0;
    }

    #content {
      background: #f3f3f3;
      width: 600px;
    }

    #sidebar {
      background: #e1e1e1;
      width: 360px;
    }
  </style>
  <div id="wrapper">
    <div id="header" class="bg-green text-white text-center p-15">
      Layout web 2 cột - Float Css
    </div>
    <div id="wp-content" class="clearfix">
      <div id="content" class="p-15 float-left">
        Content
      </div>
      <div id="sidebar" class="p-15 float-left">
        Sidebar
      </div>
    </div>
    <div id="footer" class="bg-green text-white text-center p-10">
      unitop.vn
    </div>
  </div>
</body>

</html>
