<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xây dựng layout web 2 cột với Float Css</title>
</head>

<body>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    #wrapper {
      width: 960px;
      margin: 0px auto;
    }

    .bg-green {
      background: green;
    }

    .text-white {
      color: white;
    }

    .text-center {
      text-align: center;
    }

    .p-15 {
      padding: 15px;
    }

    .p-10 {
      padding: 10px;
    }

    .float-left {
      float: left;
    }

    .box-border {
      box-sizing: border-box;
    }

    #wrapper-content-sidebar,
    #content,
    #side-bar {
      min-height: 600px;
    }

    #content {
      background: #f3f3f3;
      width: 600px;
    }

    #side-bar {
      background: #e1e1e1;
      width: 360px;
    }
  </style>
  <div id="wrapper">
    <div id="header" class="bg-green text-white text-center p-15">
      Layout web 2 cột - Float Css
    </div>
    <div id="wrapper-content-sidebar">
      <div id="content" class="p-15 float-left box-border">
        Content
      </div>
      <div id="side-bar" class="p-15 float-left box-border">
        Sidebar
      </div>
    </div>
    <div id="footer" class="bg-green text-white text-center p-10">
      unitop.vn
    </div>
  </div>
</body>

</html>
