<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Relative</title>
</head>
<body>
    <style>
        .box {
            width: 400px;
            height: 200px;
            background-color: tomato;
            position: relative;
        }
        .box:hover {
            bottom: 10px;
            left: 10px;
        }
    </style>
    <h1>Position Relative</h1>
    <div class="box">
        Box
    </div>
</body>
</html>
