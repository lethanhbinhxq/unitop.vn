<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display flex</title>
</head>
<body>
    <style>
        .box {
            width: 100px;
            padding: 40px;
            font-size: 18px;
            background: greenyellow;
            margin: 10px;
        }
        .container {
            display: flex;
            flex-direction: column-reverse;
        }
    </style>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>
</html>
