<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhóm selector theo nội dung</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <!-- <script src="js/main.js"></script> -->
</head>
<body>
    <script type="text/javascript">
        $(document).ready(function(){
            // 1. Tìm ptu ko có nội dung -> border: 1px solid #333
            // $("ul li:empty").text("Không có nội dung").css("border", "1px solid #333");
            // 2. Tìm các ptu chứa nội dung "Phần" -> màu đỏ
            // $("ul li:contains('Phần')").css('color', 'red');
            // 3. Tìm tất cả các ptu có ptu con hoặc có nội dung -> màu đỏ
            // $("ul li:parent").css('color', 'red'); // Ngược empty
            // 4. Tìm ptu có ít nhất ptu con là selector cho trc
            $("ul:has('.color_red')").css('border', '1px solid red');
        });
    </script>
    <ul>
        <li>Phần tử 1</li>
        <li>
            <ul>
                <li class="color_red">Phần tử 2.1</li>
                <li>Phần tử 2.2</li>
            </ul>
        </li>
        <li>Phần tử 3</li>
        <li>Phần tử 4
            <ul>
                <li>Phần tử 4.1</li>
                <li>Phần tử 4.2</li>
            </ul>
        </li>
    </ul>
</body>
</html>
