<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu ứng hoạt cảnh trong jquery</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <!-- <script src="js/main.js"></script> -->
</head>

<body>
    <style>
        #wrapper {
            width: 960px;
            margin: 0px auto;
            position: relative;
        }

        #box {
            width: 400px;
            padding: 40px;
            background-color: #e74c3c;
            text-align: center;
            color: white;
            position: absolute;
            top: 100px;
            left: 0px;
        }
    </style>
    <script type="text/javascript">
        $(document).ready(function () {
            $("#effect-animate").click(function () {
                $("#box").animate(
                    {
                        width: '100px',
                        padding: '200px',
                        left: '200px',
                    }, 1000
                );
            });
        });
    </script>

    <h1>Tạo hoạt cảnh bằng animate trong jquery</h1>
    <a href="#" id="effect-animate">Animate</a>
    <div id="box">BOX</div>
</body>

</html>
