<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương thức xử lý kích thước</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <!-- <script src="js/main.js"></script> -->
</head>
<body>
    <style>
        .box {
            border: 1px solid #333;
            height: 100px;
            width: 200px;
            margin: 20px 0px;
        }
        #box-1 {
            padding: 10px 20px;
        }
    </style>
    <script type="text/javascript">
        $(document).ready(function(){
            var height_box_1, inner_height_box_1, outer_height_box_1;
            height_box_1 = $("#box-1").height();
            inner_height_box_1 = $("#box-1").innerHeight();
            outer_height_box_1 = $("#box-1").outerHeight();
            console.log(height_box_1 + " - " + inner_height_box_1 + " - " + outer_height_box_1);

            var width_box_1, inner_width_box_1, outer_width_box_1;
            width_box_1 = $("#box-1").width();
            inner_width_box_1 = $("#box-1").innerWidth();
            outer_width_box_1 = $("#box-1").outerWidth();
            console.log(width_box_1 + " - " + inner_width_box_1 + " - " + outer_width_box_1);
        });
    </script>

    <h1>Phương thức xử lý kích thước trong jquery</h1>
    <div class="box" id="box-1">Box 1</div>
    <div class="box" id="box-2">Box 2</div>
    <div class="box" id="box-3">Box 3</div>
</body>
</html>
