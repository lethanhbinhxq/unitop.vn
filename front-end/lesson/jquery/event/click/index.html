<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự kiện click trong jquery</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <!-- <script src="js/main.js"></script> -->
</head>

<body>
    <style>
        #target, #other {
            display: inline-block;
            padding: 5px;
            margin: 5px;
            background-color: #333;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
        }
        #target:hover, #other:hover {
            text-decoration: underline;
        }
    </style>
    <script type="text/javascript">
        $(document).ready(function () {
            $("a#target").click(function(){
                alert("Bạn vừa click vào target");
            });

            $("a#other").click(function(){
                alert("Bạn vừa click vào other")
                $("a#target").click();
            });
        });
    </script>

    <div id="wrapper">
        <h1>Sự kiện click trong jquery</h1>
        <a href="#" id="target">#target</a>
        <a href="#" id="other">#other</a>
</body>

</html>
