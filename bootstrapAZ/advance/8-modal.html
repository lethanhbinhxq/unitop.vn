<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Modal</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-center">Bootstrap Modal</h1>

                <!-- Kích hoạt Modal -->
                 <button class="btn btn-primary" data-toggle="modal" data-target="#demo-modal">Show Modal</button>

                 <a href="#" id="run-modal">Run Modal</a>
                
                <!-- Cấu trúc Modal -->
                 <div class="modal fade" id="demo-modal">
                    <div class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal-sm">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Demo Modal</h5>
                                <button class="close" data-dismiss="modal">
                                    <span>&times;</span>
                                </button>
                            </div>
                            <!-- End modal header -->

                                    <div class="row">
                                        <div class="col-12 mb-3"><div class="bg-secondary">Col 12</div></div>
                                        <div class="col-6"><div class="bg-secondary">Col 6</div></div>
                                        <div class="col-6"><div class="bg-secondary">Col 6</div></div>
                                    </div>
                                </div>
                            </div>
                            <!-- End modal body -->
                            <div class="modal-footer">
                                <button class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                                <button class="btn btn-primary">Lưu</button>

                    </div>
                 </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#run-modal').click(function() {
                $('#demo-modal').modal();
                return false;
            });

            $('#demo-modal').on('show.bs.modal', function() {
                alert("Show Modal");
            });
            $('#demo-modal').on('shown.bs.modal', function() {
                alert("Shown Modal");
            });
            $('#demo-modal').on('hide.bs.modal', function() {
                alert("Hide Modal");
            });
            $('#demo-modal').on('hidden.bs.modal', function() {
                alert("Hidden Modal");
            });
        });
    </script>
    <script src="bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
