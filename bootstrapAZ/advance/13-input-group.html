<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Input Group</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <h1 class="text-center">Bootstrap Input Group</h1>
                
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="username">Họ tên:</label>
                    </div>
                    <input type="text" name="username" id="username" class="form-control">
                </div>

                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="email">Email</label>
                    </div>
                    <input type="email" name="email" id="email" class="form-control">
                    <div class="input-group-append">
                        <span class="input-group-text">@gmail.com</span>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="email">Email</label>
                    </div>
                    <input type="email" name="email" id="email" class="form-control">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary">Thêm mới</button>
                    </div>
                </div>

                <div class="input-group input-group-lg mb-3">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="email">Email</label>
                    </div>
                    <input type="email" name="email" id="email" class="form-control">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary">Thêm mới</button>
                    </div>
                </div>

                <div class="input-group input-group-sm mb-3">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="email">Email</label>
                    </div>
                    <input type="email" name="email" id="email" class="form-control">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary">Thêm mới</button>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text">Chọn</span>
                    </div>
                    <select class="custom-select" name="" id="">
                        <option value="">Số lượng</option>
                        <option value="">1</option>
                        <option value="">2</option>
                        <option value="">3</option>
                    </select>
                </div>

                <div class="input-group mb-3">
                    <div class="custom-file">
                        <input type="file" class="custom-file-input" name="" id="">
                        <label for="" class="custom-file-label">Chọn file</label>
                    </div>
                    <div class="input-group-append">
                            <button class="btn btn-outline-secondary">Upload</button>
                        </div>
                </div>

                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="firstname">Họ và tên</label>
                    </div>
                    <input type="text" name="firstname" id="firstname" class="form-control">
                    <input type="text" name="lastname" id="lastname" class="form-control">
                </div>

                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text" for="">$</span>
                        <span class="input-group-text" for="">.00</span>
                    </div>
                    <input type="text" name="" id="" class="form-control">
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
