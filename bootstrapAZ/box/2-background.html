<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Background trong Bootstrap</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <style>
        .box {
            padding: 15px;
            margin-bottom: 15px;

        }
    </style>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-center">Background trong Bootstrap</h1>

                <div class="box bg-primary text-light">.bg-primary</div>
                <div class="box bg-secondary text-light">.bg-secondary</div>
                <div class="box bg-success text-light">.bg-success</div>
                <div class="box bg-warning text-light">.bg-warning</div>
                <div class="box bg-danger text-light">.bg-danger</div>
                <div class="box bg-info">.bg-info</div>
                <div class="box bg-light">.bg-light</div>
                <div class="box bg-dark text-light">.bg-dark</div>
                <div class="box bg-transparent">.bg-transparent</div>
            </div>
        </div>
    </div>
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
