<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thiết lập bo tròn góc cho khối trong Bootstrap</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <style>
        .box {
            height: 100px;
            width: 100px;
            margin-bottom: 10px;
            float: left;
            margin-left: 10px;
            background-color: #b4b4b4;
        }

        .box-2 {
            height: 100px;
            width: 200px;
            margin-bottom: 10px;
            float: left;
            margin-left: 10px;
            background-color: #b4b4b4;
        }
    </style>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-center">Border trong Bootstrap</h1>
                <h3>Thiết lập border</h3>
                <div class="box rounded">100x100</div>
                <div class="box rounded-top">100x100</div>
                <div class="box rounded-right">100x100</div>
                <div class="box rounded-bottom">100x100</div>
                <div class="box rounded-left">100x100</div>
                <div class="box rounded rounded-0">100x100</div>
                <div class="box rounded-circle"></div>
                <div class="box-2 rounded-pill"></div>
            </div>
        </div>
    </div>
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
