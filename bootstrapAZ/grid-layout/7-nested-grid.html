<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nested grid</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <style>
        .item-info {
            padding: 10px;
            background: #ccc;
            min-height: 100px;
        }
        .item {
            margin-bottom: 20px;
        }
    </style>
    <div class="container">
        <div class="row">
            <div class="col-md-8" id="content">
                <h1>Danh sách bài viết / sản phẩm</h1>
                <div class="list-item">
                    <div class="row">
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                        <div class="col-md-3 col-sm-4 item">
                            <div class="item-info">Item</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4" id="sidebar">Sidebar</div>
        </div>
    </div>
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
