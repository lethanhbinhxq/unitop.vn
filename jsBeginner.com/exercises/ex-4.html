<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 4 - Tính tổng chuỗi S lũy thừa</title>
</head>
<body>
    <h1>Bài tập 4 - Tính tổng chuỗi S lũy thừa</h1>
    <script>
        // 4. Tính tổng S = 1^2 + 2^2 + 3^2 + ... + n^2
        /*
        input: n = 3
        output: S = 14
        */

        let n = 3;
        let s = 0;
        for (let i = 1; i <= n; i++) {
            s += i ** 2;
        }
        document.write("S = " + s);
    </script>
</body>
</html>
