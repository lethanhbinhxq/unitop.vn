<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 3 - Tính tổng chuỗi S các số tự nhiên</title>
</head>
<body>
    <h1>Bài tập 3 - Tính tổng chuỗi S các số tự nhiên</h1>
    <script>
        // 3. Tính tổng S = 1 + 2 + 3 + ... + n
        /*
        input: n = 5
        output: S = 15
        */

        let n = 5;
        let s = 0;
        for (let i = 1; i <= n; i++) {
            s += i;
        }
        document.write("S = " + s);
    </script>
</body>
</html>
