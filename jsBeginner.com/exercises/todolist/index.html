<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ToDoList JS</title>
</head>

<body>
    <div id="wrapper">
        <form action="" id="input_form">
            <input type="text" name="input_task" id="input_task" placeholder="Enter your task">
            <input type="submit" id="submit_task" value="ADD TASK">
        </form>

        <div id="content">
            <ul id="task_list">
            </ul>
        </div>

        <div id="num_completed"></div>
    </div>
    <script src="app.js"></script>
</body>

</html>
