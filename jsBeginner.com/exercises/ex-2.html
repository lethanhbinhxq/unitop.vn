<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 2 - Xếp loại học lực</title>
</head>
<body>
    <h1>Bài tập 2 - Xếp loại học lực</h1>
    <script>
        // 2. Xếp loại học lực theo thang điểm 10
        /*
        input: mark = 5;
        output: Trung bình
        */

        let mark = 5;
        if (mark >= 0 && mark <= 10) {
            if (mark < 5) {
                document.write("Yếu");
            } else if (mark < 7) {
                document.write("Trung bình");
            } else if (mark < 8) {
                document.write("Khá");
            } else {
                document.write("Giỏi");
            }
        } else {
            alert("Điểm số phải lớn hơn hoặc bằng 0 và bé hơn hoặc bằng 10")
        }
    </script>
</body>
</html>
