<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread operator for array</title>
</head>
<body>
    <h1>Spread operator for array</h1>
    <script>
        // Spread operator (...)
        // 1. Embed element
        let first_array = [4, 6, 10];
        // 1, 3, 4, 6, 10, 34, 56
        let second_array = [1, 3, ...first_array, 34, 56]
        console.log(second_array);

        // 2. copy array 
        // let new_array = [...first_array];
        // console.log(new_array);

        // 3. Concat array
        let new_array = [...second_array, ...first_array];
        console.log(new_array);
    </script>
</body>
</html>
