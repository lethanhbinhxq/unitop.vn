<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Extend JS</title>
</head>
<body>
    <h1>Class Extend JS</h1>
    <div id="root"></div>
    <script>
        class User {
            // - Thuộc tính
            // - Phương thức
            constructor(fullname) {
                this.fullname = fullname;
            }
            show() {
                return `Xin chào: ${this.fullname}`;
            }
            render() {
                document.getElementById('root').innerHTML = this.show();
            }
        }
        
        class Student extends User {
            constructor(fullname, uni, std_year) {
                super(fullname);
                this.uni = uni;
                this.std_year = std_year;
            }

            introduce() {
                return super.show();
                // return `Xin chào, tôi là ${this.fullname}, sinh viên năm ${this.std_year}, hiện đang học tại ${this.uni}!`;
            }
        }

        let my_std = new Student('Lê Thanh Bình', 'ĐH Bách Khoa', '4');
        console.log(my_std.introduce());
    </script>
</body>
</html>
