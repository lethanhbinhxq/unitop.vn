<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương thức làm việc thuộc tính trên DOM</title>
</head>
<body>
    <a href="" title="Demo title" count="988">Js Beginner</a>

    <script>
        const aElement = document.querySelector('a');
        console.log(aElement.title);
        console.log(aElement.count); // Undefined

        getAttribute(); // Lấy giá trị thuộc tính
        setAttribute(); // Thiết lập
        hasAttribute(); // Kiểm tra thuộc tính ở trên phần tử
        removeAttribute(); // Xóa một thuộc tính ở trên phần tử DOM
    </script>
</body>
</html>
