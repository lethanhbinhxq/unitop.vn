<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phương thức làm việc thuộc tính trên DOM</title>
</head>
<body>
    <a href="" title="Demo title" count="988">Js Beginner</a>

    <script>
        const aElement = document.querySelector('a');
        aElement.setAttribute('count', 1988);
        console.log(aElement.getAttribute('count'));

        aElement.setAttribute('author', "Lê Thanh Bình");
        
    </script>
</body>
</html>
