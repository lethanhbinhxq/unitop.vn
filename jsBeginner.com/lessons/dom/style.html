<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm việc với style css trong JS HTML DOM</title>
</head>
<body>
    <h1 id="demo">JS HTML DOM Style CSS</h1>
    <script>
        const demo = document.getElementById('demo');
        console.log(demo.style);
        demo.style.color = 'pink';
        demo.style.backgroundColor = 'black';
        console.log(demo.style.color);
    </script>
</body>
</html>
