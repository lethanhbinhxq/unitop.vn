<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thay đổi giá trị thuộc tính của một element</title>
</head>
<body>
    <h1>Thay đổi giá trị thuộc tính của một element</h1>
    <img id="demo" class="test" title="Sky" src="sky.jpg" alt="Sky">

    <script>
        const demo = document.getElementById('demo');
        demo.title = "New title";
        console.log(demo.class) // undefined
        
    </script>
</body>
</html>
