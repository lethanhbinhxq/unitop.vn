<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Dom Classlist</title>
</head>
<body>
    <h1 id="demo" class="class-1 class-2 class-3">My title</h1>
    <script>
        const demo = document.getElementById('demo');
        console.log(demo.className); // string
        console.log(demo.classList); // array

        // demo.classList[0] = 'class-new'; // not working
        demo.classList.add('class-new');
        demo.classList.remove('class-1');
        demo.classList.toggle('open');
        demo.classList.replace('open', 'show');
        console.log(demo.classList);
    </script>
</body>
</html>
