<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Method</title>
</head>
<body>
    <p id="demo">My Text</p>
    <script>
        const demo = document.getElementById("demo");
        demo.innerText = "Học lập trình web đi làm unitop.vn";
        demo.innerHTML = "<b style='color:red'>Học lập trình web đi làm unitop.vn</b>";
    </script>
</body>
</html>
