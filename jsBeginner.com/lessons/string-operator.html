<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phép toán trên chuỗi Js</title>
</head>
<body>
    <h1>Phép toán trên chuỗi Js</h1>
    <script>
        // PHÉP TOÁN TRÊN CHUỖI
        let firstName = "Bình";
        let lastName = "Lê Thanh";
        let fullName = lastName + " " + firstName;
        document.write(fullName);

        let result;
        result = 12 + 15 + "Bình" + 23;
        document.write(result);

        firstName += " " + lastName;
        document.write(firstName);
    </script>
</body>
</html>
