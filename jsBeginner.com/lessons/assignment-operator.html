<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phép toán gán Js</title>
</head>
<body>
    <h1>Phép toán gán Js</h1>
    <script>
        // PHÉP TOÁN GÁN
        let x, y;
        x = 2;
        y = 4;
        
        // =
        x = y;

        // +=
        x += y;

        // -=
        x -= y;

        // *=
        x *= y;

        // /=
        x /= y;

        // **=
        x **= y;

        // %=
        x %= y;
        console.log(x);
    </script>
</body>
</html>
