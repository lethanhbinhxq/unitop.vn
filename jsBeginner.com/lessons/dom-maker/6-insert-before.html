<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert Before Javascript</title>
</head>
<body>
    <style>
        .current {
            color: red;
        }
    </style>
    <h1>Insert Before Javascript</h1>
    <ul id="langs">
        <li>HTML</li>
        <li class="current">CSS</li>
        <li>Javascript</li>
    </ul>
    <script>
        const langs = document.getElementById('langs');
        const current = document.querySelector('li.current');
        
        const liNew = document.createElement('li');
        liNew.textContent = "PHP";

        langs.insertBefore(liNew, current);
    </script>
</body>
</html>
