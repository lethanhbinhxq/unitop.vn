<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Element Javascript</title>
</head>
<body>
    <style>
        .current {
            color: red;
        }
    </style>
    <h1>Remove Element Javascript</h1>
    <ul id="langs">
        <li>HTML</li>
        <li class="current">CSS</li>
        <li>Javascript</li>
    </ul>
    <script>
        const langs = document.getElementById('langs');
        const current = document.querySelector('li.current');
        
        // Cách 1
        // current.remove();

        // Cách 2
        langs.removeChild(current);
    </script>
</body>
</html>
