<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phép toán logic Js</title>
</head>
<body>
    <h1>Phép toán logic Js</h1>
    <script>
        // PHÉP TOÁN LOGIC
        let x = 10, y = 20;

        // AND
        if (x > 10 && y > 10) {
            document.write("x và y đều lớn hơn 10");
        }

        // OR
        if (x > 10 || y > 10) {
            document.write("x hoặc y lớn hơn 10");
        }

        // NOT
        let flag = true;
        if (!flag) {
            document.write("Bài toán sai");
        }
    </script>
</body>
</html>
