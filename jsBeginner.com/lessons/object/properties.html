<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm việc với thuộc tính trong object</title>
</head>

<body>
    <h1>Làm việc với thuộc tính trong object</h1>
    <script>
        let person = {
            firstName: 'Bình',
            lastName: 'Lê Thanh',
            age: 23,
            gender: 'female'
        }

        /*
            1. Truy xuất vào thuộc tính của object
            2. Truy xuất vào thuộc tính qua vòng lặp
            3. Cập nhật giá trị thuộc tính của object
            4. Tạo thuộc tính mới cho object
            5. Delete thuộc tính trong object
         */

        //  1. Truy xuất vào thuộc tính của object
        console.log(person.firstName);
        console.log(person['firstName']);

        //  2. Truy xuất vào thuộc tính qua vòng lặp
        for (x in person) {
            console.log(x + ": " + person[x]);
        }

        //  3. Cập nhật giá trị thuộc tính của object
        person.age = 20;
        // person['age'] = 20;
        console.log(person);

        //  4. Tạo thuộc tính mới cho object
        person.weight = 64;
        // person['weight'] = 64
        console.log(person);

        //  5. Delete thuộc tính trong object
        delete (person.weight);
        console.log(person);
    </script>
</body>

</html>
