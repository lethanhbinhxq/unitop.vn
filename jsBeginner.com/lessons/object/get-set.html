<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get và set trong object</title>
</head>
<body>
    <h1>Get và set trong object</h1>
    <script>
        // 1. Ý nghĩa setter và getter
        // 2. Làm việc với get
        // 3. Làm việc với set

        let person = {
            firstName: "Bình",
            lastName: "Lê",
            get fullName() {
                return this.lastName + " " + this.firstName;
            },
            set fullName(info) {
                info = info.split(" ");
                this.lastName = info[0];
                this.firstName = info[info.length - 1];
            }
        }
        person.fullName = "Lê Thanh Bình"
        document.write(person.fullName);
    </script>
</body>
</html>
