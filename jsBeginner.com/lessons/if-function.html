<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu thức điều kiện là một hàm</title>
</head>
<body>
    <h1>Biểu thức điều kiện là một hàm</h1>
    <script>
        function isOdd(number) {
            if (number % 2 != 0) return true;
            return false;
        }

        let number = 9;
        if (isOdd(number)) {
            document.write(number + " là số lẻ");
        }
    </script>
</body>
</html>
