<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cấu trúc if else liên hợp</title>
</head>

<body>
    <h1>Cấu trúc if else liên hợp</h1>
    <script>
        let mark;
        mark = 9;

        if (mark >= 0 && mark <= 10) {
            if (mark < 4) {
                document.write("Yếu");
            } else if (mark < 7) {
                document.write("Trung bình");
            } else if (mark < 8) {
                document.write("Khá");
            } else {
                document.write("Giỏi");
            }
        } else {
            alert("Điểm số phải lớn hơn hoặc bằng 0 và bé hơn hoặc bằng 10");
        }
    </script>
</body>

</html>
