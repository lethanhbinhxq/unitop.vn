<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết lập giá trị mặc định cho tham số trong js</title>
</head>

<body>
    <h1>Thiết lập giá trị mặc định cho tham số trong js</h1>
    <script>
        function sayHello(fullname = "Quý khách") {
            document.write("Xin chào " + fullname);
        }
        sayHello();
    </script>
</body>

</html>
