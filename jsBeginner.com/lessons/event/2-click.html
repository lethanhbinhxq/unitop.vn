<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click event js</title>
</head>
<body>
    <h1>Click event js</h1>
    <button id="btn" onclick="alert('Clicked')">Click me</button>
    <script>
        const btnElement = document.getElementById('btn');
        btnElement.addEventListener('dblclick', function(e) {
            console.log(e);
            alert('Button clicked');
        })
    </script>
</body>
</html>
