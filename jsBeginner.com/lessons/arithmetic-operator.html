<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phép toán số học Js</title>
</head>
<body>
    <h1>Phép toán số học Js</h1>
    <script>
        // PHÉP TOÁN SỐ HỌC
        let x, y, result;
        x = 2;
        y = 3;
        
        // Cộng
        result = x + y;
        
        // Trừ
        result = x - y;

        // Nhân
        result = x * y;

        // Chia
        result = x / y;

        // Lũy thừa
        result = x ** y;

        // Lấy dư
        result = x % y;
        console.log(result);
    </script>
</body>
</html>
