<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phép toán so sánh Js</title>
</head>
<body>
    <h1>Phép toán so sánh Js</h1>
    <script>
        // PHÉP TOÁN SO SÁNH
        let x, y;
        x = 30;
        y = 40;
        
        // ==
        if (x == y) {
            document.write("x bằng y");
        }

        // !=
        if (x != y) {
            document.write("x khác y");
        }

        // <
        if (x < y) {
            document.write("x bé hơn y");
        }

        // >
        if (x > y) {
            document.write("x lớn hơn y");
        }

        // <=
        if (x <= y) {
            document.write("x bé hơn hoặc bằng y");
        }

        // >=
        if (x >= y) {
            document.write("x lớn hơn hoặc bằng y");
        }

        // ===
        if (x === y) {
            document.write("x bằng y và cùng kiểu dữ liệu");
        }
    </script>
</body>
</html>
