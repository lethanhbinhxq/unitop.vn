<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data type</title>
</head>
<body>
    <h1>Data type</h1>
    <script>
        // 1. Kiểu dữ liệu số
        var number = 20;
        var b = 3.5;

        // 2. Kiểu dữ liệu chuỗi
        var fullname = "Lê Thanh Bình";

        // 3. Boolean
        let flag = true;
        let age = 23;
        if (age > 20) {
            document.write("Ngoài 20 tuổi");
        }

        // 4. Undefined
        let n;
        console.log(n);

        // 5, Null
        let m = null;

        // 6. Array
        let my_array = ['HTML', 'CSS', 'JavaScript'];

        // 7. Object
        let person = {
            'fullname': "Lê Thanh Bình",
            'age': 23,
            'gender': "Female"
        }

        console.log(person);
    </script>
</body>
</html>
