<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phép toán tăng giảm Js</title>
</head>
<body>
    <h1>Phép toán tăng giảm Js</h1>
    <script>
        // PHÉP TOÁN TĂNG GIẢM
        let x, y;
        x = 30;
        y = 100;
        
        // Tăng
        x++;
        console.log(x);

        // Giảm
        y--;
        console.log(y);
    </script>
</body>
</html>
