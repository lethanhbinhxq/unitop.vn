<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment code js</title>
</head>
<body>
    <script>
        /*
        Thực hành: Tạo ra biến a,
        sau đó gán giá trị của nó bằng 10
        */
        var a; // Khai báo biến a
        a = 10; // Gán giá trị 10 cho biến a
    </script>
